<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Concordato Galáctico</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="map"></div>

  <!-- Barra de sesión -->
  <div id="barra-sesion">
    <span id="info-usuario">Cargando...</span>
    <button id="btn-login"  onclick="loginGoogle()"  class="oculto">🔑 Iniciar sesión con Google</button>
    <button id="btn-logout" onclick="logoutGoogle()" class="oculto">Cerrar sesión</button>
  </div>

  <!-- Panel lateral -->
  <div id="panel" class="oculto">
    <button class="btn-cerrar" onclick="cerrarPanel()">✕</button>
    <div id="panel-subcat-icons"></div>
    <div id="panel-scroll">
      <div id="panel-contenido"></div>
    </div>
    <div id="panel-resize-handle" title="Arrastrar para redimensionar"></div>
  </div>

  <!-- Botón añadir marca -->
  <button id="btn-añadir" class="oculto" onclick="activarModoPin()">📌 Añadir marca</button>

  <!-- Instrucción modo marca -->
  <div id="instruccion" class="oculto">
    Haz clic en el mapa para colocar la marca
    <button onclick="cancelarModoPin()">Cancelar</button>
  </div>

  <!-- Modal nueva marca -->
  <div id="modal" class="oculto">
    <div id="modal-caja">
      <h2>📌 Nueva marca</h2>

      <label>Título *</label>
      <input type="text" id="input-nombre" placeholder="Escribe lo que quieras..." />

      <label>Categoría *</label>
      <select id="input-categoria">
        <option value="Armada">Armada</option>
        <option value="Batalla Naval">Batalla Naval</option>
        <option value="Capital">Capital</option>
        <option value="Contaminación">Contaminación</option>
        <option value="Estación Espacial 1">Estación Espacial 1</option>
        <option value="Estación Espacial 2">Estación Espacial 2</option>
        <option value="Estructura Espacial">Estructura Espacial</option>
        <option value="Fauna Espacial dócil">Fauna Espacial dócil</option>
        <option value="Fauna Espacial hostil">Fauna Espacial hostil</option>
        <option value="Fauna Espacial">Fauna Espacial</option>
        <option value="Flota Civil">Flota Civil</option>
        <option value="Grieta Astral">Grieta Astral</option>
        <option value="Hábitat Orbital">Hábitat Orbital</option>
        <option value="Monstruo Espacial">Monstruo Espacial</option>
        <option value="Nave Civil">Nave Civil</option>
        <option value="Peligro">Peligro</option>
        <option value="Planeta Bajo Asedio">Planeta Bajo Asedio</option>
        <option value="Planeta Científico">Planeta Científico</option>
        <option value="Planeta Colonizado">Planeta Colonizado</option>
        <option value="Planeta Comercial">Planeta Comercial</option>
        <option value="Planeta Disponible">Planeta Disponible</option>
        <option value="Planeta Espiritual">Planeta Espiritual</option>
        <option value="Planeta Industrial">Planeta Industrial</option>
        <option value="Planeta Minero">Planeta Minero</option>
        <option value="Planeta Natural">Planeta Natural</option>
        <option value="Planeta Ocio">Planeta Ocio</option>
        <option value="Planeta Ocupado">Planeta Ocupado</option>
        <option value="Planeta Prisión">Planeta Prisión</option>
        <option value="Planeta Robot">Planeta Robot</option>
        <option value="Planeta Urbano">Planeta Urbano</option>
        <option value="Radiación">Radiación</option>
        <option value="Sistema Agujero Negro">Sistema Agujero Negro</option>
        <option value="Sistema Binario">Sistema Binario</option>
        <option value="Sistema Genérico">Sistema Genérico</option>
        <option value="Sistema Ocupado">Sistema Ocupado</option>
        <option value="Sistema Primario">Sistema Primario</option>
        <option value="Sistema Púlsar">Sistema Púlsar</option>
        <option value="Sistema Trinario">Sistema Trinario</option>
        <option value="Sonda">Sonda</option>
        <option value="Símbolo Genérico 1">Símbolo Genérico 1</option>
      </select>

      <label>Descripción</label>
      <div class="editor-toolbar">
        <button type="button" onclick="formatText('bold')"      title="Negrita"><b>N</b></button>
        <button type="button" onclick="formatText('italic')"    title="Cursiva"><i>C</i></button>
        <button type="button" onclick="formatText('underline')" title="Subrayado"><u>S</u></button>
        <div class="toolbar-sep"></div>
        <select onchange="formatSize(this)" title="Tamaño de texto">
          <option value="3">Normal</option>
          <option value="1">Pequeño</option>
          <option value="5">Grande</option>
          <option value="7">Muy grande</option>
        </select>
        <div class="toolbar-sep"></div>
        <button type="button" onclick="insertarImagenEditor()" title="Insertar imagen en el texto">🖼️</button>
      </div>
      <div id="input-descripcion-editor" class="editor-content" contenteditable="true"
           data-placeholder="Escribe lo que quieras..."></div>

      <label>Fotos de pie de página (Pueden ser varias):</label>
      <input type="file" id="input-fotos" accept="image/*" multiple />
      <div id="preview-fotos"></div>

      <div id="progreso-caja" class="oculto">
        <div id="progreso-barra"></div>
        <span id="progreso-texto">Subiendo fotos...</span>
      </div>

      <!-- Subcategorías nueva marca -->
      <div id="nuevas-subcats-wrap"></div>
      <button type="button" class="btn-añadir-subcat" onclick="añadirSubcatForm('nuevo')">➕ Añadir Subcategoría</button>

      <button id="btn-guardar" onclick="guardarPin()">💾 Guardar marca</button>
      <button class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>

  <!-- Modal edición marca -->
  <div id="modal-edicion" class="oculto">
    <div id="modal-edicion-caja">
      <h2>✏️ Editar marca</h2>

      <label>Título *</label>
      <input type="text" id="edit-nombre" placeholder="Ej: Nebulosa de los Caídos" />

      <label>Categoría *</label>
      <select id="edit-categoria">
        <option value="Armada">Armada</option>
        <option value="Batalla Naval">Batalla Naval</option>
        <option value="Capital">Capital</option>
        <option value="Contaminación">Contaminación</option>
        <option value="Estación Espacial 1">Estación Espacial 1</option>
        <option value="Estación Espacial 2">Estación Espacial 2</option>
        <option value="Estructura Espacial">Estructura Espacial</option>
        <option value="Fauna Espacial dócil">Fauna Espacial dócil</option>
        <option value="Fauna Espacial hostil">Fauna Espacial hostil</option>
        <option value="Fauna Espacial">Fauna Espacial</option>
        <option value="Flota Civil">Flota Civil</option>
        <option value="Grieta Astral">Grieta Astral</option>
        <option value="Hábitat Orbital">Hábitat Orbital</option>
        <option value="Monstruo Espacial">Monstruo Espacial</option>
        <option value="Nave Civil">Nave Civil</option>
        <option value="Peligro">Peligro</option>
        <option value="Planeta Bajo Asedio">Planeta Bajo Asedio</option>
        <option value="Planeta Científico">Planeta Científico</option>
        <option value="Planeta Colonizado">Planeta Colonizado</option>
        <option value="Planeta Comercial">Planeta Comercial</option>
        <option value="Planeta Disponible">Planeta Disponible</option>
        <option value="Planeta Espiritual">Planeta Espiritual</option>
        <option value="Planeta Industrial">Planeta Industrial</option>
        <option value="Planeta Minero">Planeta Minero</option>
        <option value="Planeta Natural">Planeta Natural</option>
        <option value="Planeta Ocio">Planeta Ocio</option>
        <option value="Planeta Ocupado">Planeta Ocupado</option>
        <option value="Planeta Prisión">Planeta Prisión</option>
        <option value="Planeta Robot">Planeta Robot</option>
        <option value="Planeta Urbano">Planeta Urbano</option>
        <option value="Radiación">Radiación</option>
        <option value="Sistema Agujero Negro">Sistema Agujero Negro</option>
        <option value="Sistema Binario">Sistema Binario</option>
        <option value="Sistema Genérico">Sistema Genérico</option>
        <option value="Sistema Ocupado">Sistema Ocupado</option>
        <option value="Sistema Primario">Sistema Primario</option>
        <option value="Sistema Púlsar">Sistema Púlsar</option>
        <option value="Sistema Trinario">Sistema Trinario</option>
        <option value="Sonda">Sonda</option>
        <option value="Símbolo Genérico 1">Símbolo Genérico 1</option>
      </select>

      <label>Descripción</label>
      <div class="editor-toolbar">
        <button type="button" onclick="formatText('bold')"      title="Negrita"><b>N</b></button>
        <button type="button" onclick="formatText('italic')"    title="Cursiva"><i>C</i></button>
        <button type="button" onclick="formatText('underline')" title="Subrayado"><u>S</u></button>
        <div class="toolbar-sep"></div>
        <select onchange="formatSize(this)" title="Tamaño de texto">
          <option value="3">Normal</option>
          <option value="1">Pequeño</option>
          <option value="5">Grande</option>
          <option value="7">Muy grande</option>
        </select>
        <div class="toolbar-sep"></div>
        <button type="button" onclick="insertarImagenEditor()" title="Insertar imagen en el texto">🖼️</button>
      </div>
      <div id="edit-descripcion-editor" class="editor-content" contenteditable="true"
           data-placeholder="Escribe lo que quieras..."></div>

      <label>Fotos actuales</label>
      <div id="edit-fotos-existentes"></div>

      <label>Añadir nuevas fotos</label>
      <input type="file" id="edit-fotos-nuevas" accept="image/*" multiple />
      <div id="edit-preview-nuevas"></div>

      <div id="edit-progreso-caja" class="oculto">
        <div id="edit-progreso-barra"></div>
        <span id="edit-progreso-texto">Subiendo fotos...</span>
      </div>

      <!-- Subcategorías edición -->
      <div id="edit-subcats-wrap"></div>
      <button type="button" class="btn-añadir-subcat" onclick="añadirSubcatForm('edit')">➕ Añadir Subcategoría</button>

      <button id="btn-guardar-edicion" onclick="guardarEdicion()">💾 Guardar cambios</button>
      <button class="btn-secundario" onclick="cerrarModalEdicion()">Cancelar</button>
    </div>
  </div>

  <!-- Modal tamaño de icono -->
  <div id="modal-tamaño" class="oculto">
    <div id="modal-tamaño-caja">
      <h2>🔍 Tamaño del icono</h2>
      <div class="tamaño-slider-row">
        <input type="range" id="tamaño-slider" min="0.5" max="5" step="0.1" value="1" />
        <span id="tamaño-valor">1.0×</span>
      </div>
      <div class="tamaño-hints">
        <span>0.5×</span>
        <span>normal: 1×</span>
        <span>5×</span>
      </div>
      <button id="btn-guardar-tamaño" onclick="guardarTamaño()">💾 Guardar tamaño</button>
      <button class="btn-secundario" onclick="cerrarModalTamaño()">Cancelar</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
